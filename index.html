<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャラクター図鑑</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f0f;
  color: #eee;
}

/* タイトル */
header {
  text-align: center;
  padding: 20px;
  background: #1a1a1a;
  font-size: 24px;
  letter-spacing: 2px;
}

/* グリッド */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* カード */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.name {
  padding: 10px;
  font-size: 18px;
  text-align: center;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
}

.modal img {
  width: 100%;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>
<body>

<header>キャラクター図鑑</header>

<div class="container" id="list"></div>

<!-- 詳細モーダル -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">×</div>
    <img id="m-img">
    <h2 id="m-name"></h2>
    <p id="m-detail"></p>
  </div>
</div>

<script>
const characters = [
  {
    name: "HN-001",
    img: "https://via.placeholder.com/400x250",
    detail: "黒い身体で複数の目が顔にある55mほどの巨人。\n物理的干渉が不可能。瞬間移動が出来る。"
  },
  {
    name: "NC-002",
    img: "https://via.placeholder.com/400x250",
    detail: "3色の浮遊する直径70cmリング。\n知性を持ち、それぞれで性格がある。\nピンク(NC-002-1)は知性的、水色(NC-002-2)は楽観的、黄緑(NC-002-3)は好戦的。\nリング状のエネルギー派、高速飛行、鋭利な身体を使う。"
  },
  {
    name: "HC-003",
    img: "https://via.placeholder.com/400x250",
    detail: "人型の機械で頭部がヒーターになっている。\n頭部のヒーターは400度まで出せる。\n腕は4本あり手の平にコンセントがあり、挿したものを使える。\n誠実で軽微な潔癖症。"
  },
  {
    name: "HF-004",
    img: "https://via.placeholder.com/400x250",
    detail: "高さ17cmのプラモデルの騎士。\n従順で厳格な性格。以外と機敏で戦闘IQは高い。\n剣(HF-004-2)はステンレス製。\n盾(HF-004-3)は破壊不能。"
  },
    {
    name: "NN-005",
    img: "https://via.placeholder.com/400x250",
    detail: "人(NN-005-1)と多腕の人型とされている姿(NN-005-2)。\n現在NN-005-2はNN-005-1こと間 優氏のみ視認可能。\nNN-005-2は氏を守るように動いている。氏や他の命令は聞かない。\n氏は触れられるが他者は物理的接触が不可能。\nNN-005-2は飛行能力を有しているとされている。\nNN-005-1は前向きな性格。"
  },
    {
    name: "HF-006",
    img: "https://via.placeholder.com/400x250",
    detail: "水色の髪の青年。\n強力な念力が使え、空も飛べる。\n温和で人当たりがよい。"
  },
];

// 一覧生成
const list = document.getElementById("list");

characters.forEach(c => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${c.img}">
    <div class="name">${c.name}</div>
  `;
  div.onclick = () => openModal(c);
  list.appendChild(div);
});

// モーダル処理
function openModal(c) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("m-img").src = c.img;
  document.getElementById("m-name").innerText = c.name;
  document.getElementById("m-detail").innerText = c.detail;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
