<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャラクター図鑑</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f0f;
  color: #eee;
}

/* タイトル */
header {
  text-align: center;
  padding: 20px;
  background: #1a1a1a;
  font-size: 24px;
  letter-spacing: 2px;
}

/* グリッド */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* カード */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.name {
  padding: 10px;
  font-size: 18px;
  text-align: center;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
}

.modal img {
  width: 100%;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>

// モーダル処理
function openModal(c) {

  document.getElementById("m-img").src = c.img;
  document.getElementById("m-name").innerText = c.name;

function closeModal() {
  document.getElementById("modal").style.display = "none";
