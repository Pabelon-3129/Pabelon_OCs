header {
  text-align: center;
  padding: 20px;
  background: #1a1a1a;
  font-size: 24px;
  letter-spacing: 2px;
}

h2 {
  border-left: 4px solid #888;
  padding-left: 10px;
  margin: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.name {
  padding: 10px;
  font-size: 18px;
  text-align: center;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
}

.modal img {
  width: 100%;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>

const list = document.getElementById("list");

categories.forEach(cat => {
  const title = document.createElement("h2");
  title.textContent = cat.title;
  list.appendChild(title);

  const grid = document.createElement("div");
  grid.className = "container";

  cat.characters.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${c.img}">
      <div class="name">${c.name}</div>
    `;
    div.onclick = () => openModal(c);
    grid.appendChild(div);
  });

  list.appendChild(grid);
});

function openModal(c) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("m-img").src = c.img;
  document.getElementById("m-name").innerText = c.name;
  document.getElementById("m-detail").innerText = c.detail;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
